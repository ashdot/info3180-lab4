{% extends 'base.html' %}

{% block main %}

<h1>Uploaded Images</h1>

    
<ul class="image-grid" style="list-style: none; padding: 0;">
    {% for image in images %}

        <li>
            <img src="{{ url_for('get_image', filename=image) }}" width="200" alt="">
        </li>
  
    {% endfor %}
</ul>



    



{% endblock %}
